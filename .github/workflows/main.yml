name: Update leaderboard

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch: {}
  push:
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: update-leaderboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Recompute standings
        run: node scripts/update.mjs

      - name: Commit if changed
        run: |
          git config user.name  "sweepstakes-bot"
          git config user.email "actions@github.com"
          if [ -n "$(git status --porcelain data/standings.json)" ]; then
            git add data/standings.json
            git commit -m "Update standings ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          else
            echo "No change in standings."
          fi
